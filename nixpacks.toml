# nixpacks.toml para Railway
# Instalamos las dependencias requeridas por Puppeteer / Chromium
providers = ["node"]

[phases.setup]
nixPkgs = [
  "...", # Keep default nix packages for node
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "libxkbcommon",
  "libXcomposite",
  "libXdamage",
  "libXrandr",
  "mesa",
  "alsa-lib",
  "pango",
  "cairo",
  "expat",
]

[phases.build]
cmds = ["pnpm install", "pnpm build"]

[start]
cmd = "pnpm start"
